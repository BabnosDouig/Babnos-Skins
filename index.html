      text-decoration: none;

    }

    .skin:last-child {
      margin-bottom: 0;
    }

    .skin h2 {
      display: inline-block;
      color: #2f81f7;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(47, 129, 247, 0.35);

    }

    .skin img {
      width: 100%;
      display: block;
      border: 1px solid #30363d;
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.55);
    }

    .skin:hover h2 {

    }
