<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Babnos Skins</title>
  <style>
    body {
      margin: 0;
      background: url("Babnos Compilation.jpg") center / cover fixed;
      color: #e6edf3;
      font-family: Arial, sans-serif;
    }

    main {
      position: relative;
      max-width: 980px;
      margin: 48px auto;
      padding: 24px;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 12px;
    }

    h1 {
      border-bottom: 1px solid #30363d;
      padding-bottom: 10px;
      padding-right: 340px;
      margin-top: 0;
      margin-bottom: 32px;
    }

    .profile-links {
      position: absolute;
      top: 18px;
      right: 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 300px;
      box-sizing: border-box;
      padding: 8px;
      background: rgba(0, 0, 0, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }

    .profile-links a {
      text-align: center;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
      padding: 7px 0;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.08);
    }

    .profile-links .osu-link {
      color: #ff7cbb;
    }

    .profile-links .youtube-link {
      color: #ff0000;
    }

    .profile-links .twitch-link {
      color: #6441a5;
    }

    .profile-links a:hover {
      transform: translateY(-1px);
    }

    .profile-links .osu-link:hover {
      color: #ff87c6;
    }

    .profile-links .youtube-link:hover {
      color: #ff4d4d;
    }

    .profile-links .twitch-link:hover {
      color: #8f6bdc;
    }

    .music-controls {
      position: absolute;
      top: 92px;
      right: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 300px;
      box-sizing: border-box;
      padding: 8px;
      background: rgba(0, 0, 0, 0.58);
      border: 1px solid rgba(255, 209, 102, 0.35);
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }

    .music-button {
      color: #ffd166;
      background: rgba(255, 255, 255, 0.08);
      border: 0;
      border-radius: 7px;
      padding: 7px 11px;
      font-weight: bold;
      cursor: pointer;
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #e6edf3;
      font-size: 13px;
      font-weight: bold;
    }

    #volume-slider {
      appearance: none;
      width: 110px;
      height: 6px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      outline: none;
      cursor: pointer;
    }

    #volume-slider::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      background: #ffd166;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(255, 209, 102, 0.18);
    }

    #volume-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #ffd166;
      border: 0;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(255, 209, 102, 0.18);
    }

    #volume-slider::-moz-range-track {
      height: 6px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 999px;
    }

    .skin {
      display: block;
      color: inherit;
      text-decoration: none;
      margin-bottom: 32px;
    }

    .skin:last-child {
      margin-bottom: 0;
    }

    .skin h2 {
      display: inline-block;
      color: #ffd166;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(255, 209, 102, 0.4);
      border-radius: 8px;
      padding: 8px 14px;
      margin-bottom: 12px;
    }

    .skin img {
      width: 100%;
      display: block;
      border: 1px solid #30363d;
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.55);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .skin:hover h2 {
      color: #ffe08a;
      text-decoration: underline;
    }

    .skin:hover img {
      transform: translateY(-2px);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.7);
    }
  </style>
</head>
<body>
  <main>
    <h1>Babnos Skins</h1>

    <div class="profile-links">
      <a class="osu-link" href="https://osu.ppy.sh/users/14315987" target="_blank">osu!</a>
      <a class="youtube-link" href="https://www.youtube.com/@BabnosDouig" target="_blank">YouTube</a>
      <a class="twitch-link" href="https://www.twitch.tv/babnosdouig" target="_blank">Twitch</a>
    </div>

    <div class="music-controls">
      <button class="music-button" onclick="toggleMusic()">Play music</button>

      <label class="volume-control">
        Volume
        <input id="volume-slider" type="range" min="0" max="100" value="7">
      </label>

      <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
      </audio>
    </div>

    <a class="skin" href="Babnos Willy.osk" download>
      <h2>Babnos Willy</h2>
      <img src="Babnos Willy.png" alt="Babnos Willy skin preview">
    </a>

    <a class="skin" href="Babnos xishu.osk" download>
      <h2>Babnos xishu</h2>
      <img src="Babnos xishu.png" alt="Babnos xishu skin preview">
    </a>

    <a class="skin" href="Babnos Varvalian.osk" download>
      <h2>Babnos Varvalian</h2>
      <img src="Babnos Varvalian.png" alt="Babnos Varvalian skin preview">
    </a>

    <a class="skin" href="Babnos DT.osk" download>
      <h2>Babnos DT</h2>
      <img src="Babnos DT.png" alt="Babnos DT skin preview">
    </a>

    <a class="skin" href="Babnos DT Flipped.osk" download>
      <h2>Babnos DT Flipped</h2>
      <img src="Babnos DT Flipped.png" alt="Babnos DT Flipped skin preview">
    </a>

    <a class="skin" href="Babnos Clack.osk" download>
      <h2>Babnos Clack</h2>
      <img src="Babnos Clack.png" alt="Babnos Clack skin preview">
    </a>
  </main>

  <script>
    const music = document.getElementById("bg-music");
    const musicButton = document.querySelector(".music-button");
    const volumeSlider = document.getElementById("volume-slider");

    music.volume = 0.07;

    volumeSlider.addEventListener("input", () => {
      music.volume = volumeSlider.value / 100;
    });

    function toggleMusic() {
      if (music.paused) {
        music.play();
        musicButton.textContent = "Pause music";
      } else {
        music.pause();
        musicButton.textContent = "Play music";
      }
    }
  </script>
</body>
</html>
